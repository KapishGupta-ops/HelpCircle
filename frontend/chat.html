<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Messages - HelpCircle</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .chat-container {
            display: flex;
            height: min(calc(100vh - 120px), 760px);
            max-width: 1120px;
            margin: 20px auto;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(2, 6, 23, 0.12);
            gap: 0;
        }
        .conversations-sidebar {
            width: 320px;
            border-right: 1px solid var(--border-color);
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .messages-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }
        .conversation-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }
        .conversation-item:hover {
            background: var(--hover-bg);
        }
        .conversation-item.active {
            background: var(--primary-color-light);
            border-left: 3px solid var(--primary-color);
        }
        .conversation-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .conversation-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }
        .conversation-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .message-group.sent {
            justify-content: flex-end;
        }
        .message-content-wrap {
            max-width: min(78%, 720px);
        }
        .message-bubble {
            max-width: none;
            width: fit-content;
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message-group.received .message-bubble {
            background: var(--message-received-bg);
            color: var(--text-primary);
        }
        .message-group.sent .message-bubble {
            background: var(--primary-color);
            color: white;
        }
        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .message-input-area {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            background: var(--card-bg);
        }
        .message-input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .composer-card {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            background: var(--input-bg);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.06);
            overflow: hidden;
        }
        .composer-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            background: color-mix(in srgb, var(--input-bg) 85%, var(--bg-color) 15%);
        }
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tool-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            border-radius: 10px;
            min-width: 34px;
            height: 34px;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-1px);
        }
        .emoji-panel {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            background: color-mix(in srgb, var(--input-bg) 90%, var(--bg-color) 10%);
        }
        .emoji-panel.show {
            display: flex;
        }
        .emoji-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            line-height: 1;
            cursor: pointer;
        }
        .emoji-btn:hover {
            border-color: var(--primary-color);
        }
        .message-editor {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 0;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            line-height: 1.45;
            min-height: 88px;
            max-height: 180px;
            overflow-y: auto;
            outline: none;
            white-space: pre-wrap;
        }
        .message-editor:empty:before {
            content: attr(data-placeholder);
            color: var(--text-secondary);
            pointer-events: none;
        }
        .message-editor img {
            max-width: min(260px, 100%);
            border-radius: 12px;
            display: block;
            margin: 4px 0;
            border: 1px solid var(--border-color);
        }
        .message-input-group:focus-within .composer-card {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px var(--primary-color-light);
        }
        .send-btn {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .send-btn:hover:not(:disabled) {
            background: var(--primary-color-dark);
            transform: translateY(-2px);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message-bubble img {
            max-width: min(320px, 100%);
            border-radius: 12px;
            margin-top: 4px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: block;
        }
        .message-bubble p {
            margin: 0;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            gap: 12px;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            font-size: 48px;
            opacity: 0.3;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }
        .no-conversations {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }
        .delete-btn:hover {
            color: #ef4444;
        }
        @media (max-width: 768px) {
            .chat-container {
                height: 100%;
                max-width: 100%;
                margin: 0;
                border: none;
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
            }
            .conversations-sidebar {
                width: 100%;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .messages-panel {
                min-height: 60vh;
            }
            .message-content-wrap {
                max-width: 92%;
            }
            .message-editor {
                min-height: 90px;
            }
        }
        :root {
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            --bg-color: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --hover-bg: #f1f5f9;
            --primary-color: #ea580c;
            --primary-color-light: #fef3c7;
            --primary-color-dark: #dc2626;
            --message-received-bg: #e2e8f0;
            --input-bg: #ffffff;
        }
        html.dark {
            --border-color: #334155;
            --card-bg: #1e293b;
            --bg-color: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --hover-bg: #334155;
            --primary-color: #ea580c;
            --primary-color-light: #7c2d12;
            --primary-color-dark: #b91c1c;
            --message-received-bg: #334155;
            --input-bg: #1e293b;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-secondary);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-4 py-4 border-b border-slate-200/50 dark:border-slate-800/50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-200 dark:shadow-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 21l-8.228-9.96a5 5 0 117.228-6.904 5 5 0 117.228 6.904L12 21z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Help<span class="text-orange-600">Circle</span></h1>
            </div>
            
            <div class="hidden md:flex items-center gap-1 bg-slate-100/50 dark:bg-slate-800/50 p-1 rounded-2xl border border-slate-200/50 dark:border-slate-700/50">
                <a href="index.html" class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 dark:text-slate-400 hover:text-primary-600">Explore</a>
                <a href="groups.html" class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 dark:text-slate-400 hover:text-primary-600">Groups</a>
                <a href="leaderboard.html" class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 dark:text-slate-400 hover:text-primary-600">Leaderboard</a>
                <a href="profile.html" class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 dark:text-slate-400 hover:text-primary-600">Profile</a>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end mr-1">
                    <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Local Karma</span>
                    <span id="userKarmaDisplay" class="text-sm font-extrabold text-orange-600">...</span>
                </div>
                <div class="notification-wrap">
                    <button id="notificationBtn" class="notification-btn" title="Notifications">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span id="notificationBadge" class="notification-badge hidden">0</span>
                    </button>
                    <div id="notificationPanel" class="notification-panel hidden">
                        <div class="notification-panel-header">
                            <h4>Notifications</h4>
                            <button id="notificationMarkAll" class="notification-mark-all">Mark all read</button>
                        </div>
                        <div id="notificationList" class="notification-list"></div>
                    </div>
                </div>
                <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">
                    <svg class="theme-toggle-icon sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1m-16 0H1m15.364 1.636l.707.707M6.343 6.343l-.707-.707m12.728 0l-.707.707m-12.02 12.02l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <svg class="theme-toggle-icon moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
                <a href="profile.html" class="group relative">
                    <div id="userInitial" class="w-11 h-11 bg-white dark:bg-slate-800 border-2 border-orange-100 dark:border-orange-900/50 text-orange-600 rounded-2xl flex items-center justify-center font-bold text-lg shadow-sm transition-all group-hover:border-orange-500 group-hover:shadow-md group-active:scale-90">?</div>
                    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-white dark:border-slate-800 rounded-full"></div>
                </a>
            </div>
        </div>
    </nav>

    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Conversations Sidebar -->
        <div class="conversations-sidebar">
            <div class="sidebar-header">
                <h3>Messages</h3>
            </div>
            <div class="conversations-list" id="conversationsList">
                <div class="no-conversations">Loading conversations...</div>
            </div>
        </div>

        <!-- Messages Panel -->
        <div class="messages-panel">
            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">💬</div>
                <p>Select a conversation or offer help to someone nearby</p>
            </div>
            <div id="chatPanel" class="messages-panel" style="display: none;">
                <div class="panel-header">
                    <h2 id="chatHeaderName">Chat</h2>
                    <button class="delete-btn" id="deleteConvBtn" title="Delete conversation">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                <div class="messages-list" id="messagesList"></div>
                <div class="message-input-area">
                    <div class="message-input-group">
                        <div class="composer-card">
                            <div class="composer-toolbar">
                                <div class="toolbar-group">
                                    <button type="button" class="tool-btn" data-cmd="bold" title="Bold">B</button>
                                    <button type="button" class="tool-btn" data-cmd="italic" title="Italic">I</button>
                                    <button type="button" class="tool-btn" data-cmd="underline" title="Underline">U</button>
                                    <button type="button" class="tool-btn" id="emojiToggle" title="Emoji">:)</button>
                                    <button type="button" class="tool-btn" id="imageUploadBtn" title="Add image">IMG</button>
                                </div>
                            </div>
                            <div id="emojiPanel" class="emoji-panel">
                                <button type="button" class="emoji-btn" data-emoji="😀">😀</button>
                                <button type="button" class="emoji-btn" data-emoji="🙂">🙂</button>
                                <button type="button" class="emoji-btn" data-emoji="😂">😂</button>
                                <button type="button" class="emoji-btn" data-emoji="😍">😍</button>
                                <button type="button" class="emoji-btn" data-emoji="🙏">🙏</button>
                                <button type="button" class="emoji-btn" data-emoji="👍">👍</button>
                                <button type="button" class="emoji-btn" data-emoji="🔥">🔥</button>
                                <button type="button" class="emoji-btn" data-emoji="🎉">🎉</button>
                            </div>
                            <div
                                id="messageInput"
                                class="message-editor"
                                contenteditable="true"
                                data-placeholder="Type a message..."
                            ></div>
                            <input id="imageInput" type="file" accept="image/*" hidden>
                        </div>
                        <button id="sendBtn" class="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden"></div>

    <!-- Theme Toggle Script -->
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme');

        if (savedTheme) {
            html.classList.toggle('dark', savedTheme === 'dark');
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>

    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
